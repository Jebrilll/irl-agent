name: Android Build Check

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 11

      - name: Make Gradle executable
        run: chmod +x gradlew

      - name: Build AAB
        run: |
          ./gradlew --stacktrace --info :app:bundleRelease
