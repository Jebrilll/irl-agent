workflows:
  android-release:
    name: Android Release Build
    max_build_duration: 60
    environment:
      vars:
        PACKAGE_NAME: "com.irl.agent"
      java: 11

    scripts:
      - name: Build AAB
        script: |
          chmod +x gradlew
          ./gradlew bundleRelease

    artifacts:
      - app/build/outputs/**/*.aab
